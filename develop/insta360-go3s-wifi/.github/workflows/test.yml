name: test

on:
  push:
    paths:
      - "develop/insta360-go3s-wifi/**"
  pull_request:
    paths:
      - "develop/insta360-go3s-wifi/**"

defaults:
  run:
    working-directory: develop/insta360-go3s-wifi

jobs:
  pytest:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
